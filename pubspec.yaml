name: AIyam
description: "Inspirasi Resep Masakan Ayam"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.0.4
  provider: ^6.1.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo/logoAIyam.png"
  adaptive_icon_foreground: "assets/logo/logoAIyam.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logo/
